name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed for Trivy to upload SARIF results
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Version resolves from package.json#packageManager (pnpm@9.12.0).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        env:
          SENTINEL_MOCK: "1"
        run: pnpm build

      - name: Docker build (verify Dockerfile)
        run: docker build -t dataform-sentinel:ci .

      # Security: scan the image for known CVEs in the base image + installed deps.
      # Fails the build on HIGH/CRITICAL vulns; uploads SARIF to the Security tab.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dataform-sentinel:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  shellcheck:
    name: shellcheck (bash scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts
          severity: warning
